services:
  - type: web
    name: fitness-quiz-bot
    runtime: python-3.13
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m src.main
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: WEBHOOK_PATH
        value: /webhook
